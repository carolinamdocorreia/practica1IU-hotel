<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lumina Grand Hotel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <style>
        .login-section {
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            color: var(--navy);
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .login-form {
            margin-top: 30px;
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--navy);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .validation-hint {
            font-size: 10px;
            color: var(--gray-text);
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo-wrapper">
                <img src="logotipohotel.png" alt="Lumina Logo" class="header-logo-img">
                <span class="logo-text">LUMINA</span>
            </a>
        </div>
    </header>

    <main class="login-section">
        <div class="login-card">
            <span class="badge badge-gold">Bem-vindo de volta</span>
            <h2>Aceder à sua conta</h2>
            
            <form class="login-form" id="loginForm" onsubmit="event.preventDefault(); fazerLogin(document.getElementById('email').value);"> 
                
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <div class="password-container">
                        <input type="password" id="password" placeholder="••••••••" required minlength="5">
                        <button type="button" id="togglePassword" class="toggle-btn">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <span class="validation-hint">A palavra-passe deve ter no mínimo 5 caracteres.</span>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    Entrar
                </button>
            </form>
            
            <p style="margin-top: 25px; font-size: 13px; color: var(--gray-text);">
                Ainda não tem conta? 
                <a href="registo.html" style="color: var(--gold); font-weight: 600; text-decoration: none;">Registe-se aqui</a>
            </p>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // Lógica visual para mostrar/esconder a password
        const togglePassword = document.querySelector('#togglePassword');
        const passwordField = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });
    </script>

</body>
</html>
